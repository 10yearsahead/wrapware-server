
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;
  --surface:#13131a;
  --surface2:#1a1a24;
  --surface3:#222232;
  --border:#ffffff0f;
  --border2:#ffffff18;
  --accent:#7c6af7;
  --accent2:#a78bfa;
  --green:#34d399;
  --red:#f87171;
  --text1:#f1f0ff;
  --text2:#9b99b4;
  --text3:#5a5870;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
.wrap{background:var(--bg);min-height:520px;padding:24px;font-family:var(--font);border-radius:16px}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.logo-box{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3b2fcf,#7c6af7);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-box svg{width:20px;height:20px}
.hdr-text h1{font-size:15px;font-weight:600;color:var(--text1);letter-spacing:.02em}
.hdr-text p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:5px 12px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px #34d39980}
.dot.off{background:var(--red);box-shadow:0 0 6px #f8717180}
.pill span{font-size:11px;color:var(--text2);font-family:var(--mono)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:600;color:var(--text1);font-family:var(--mono)}
.stat-val small{font-size:11px;font-weight:400;color:var(--text3);margin-left:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon.purple{background:#3b2fcf22;border:1px solid #7c6af730}
.icon.emerald{background:#05966922;border:1px solid #34d39930}
.card-lbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.card-desc{font-size:11px;color:var(--text3);margin-top:1px}
.input-row{display:flex;gap:8px}
.inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;font-family:var(--mono);color:var(--text1);outline:none;transition:border-color .2s}
.inp::placeholder{color:var(--text3)}
.inp:focus{border-color:#7c6af750;background:var(--surface3)}
.btn{padding:9px 18px;border-radius:8px;font-size:12px;font-family:var(--mono);font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;letter-spacing:.04em}
.btn.v{background:linear-gradient(135deg,#3b2fcf,#7c6af7);color:#fff}
.btn.v:hover{opacity:.85;transform:translateY(-1px)}
.btn.g{background:#05966920;border:1px solid #34d39930;color:var(--green)}
.btn.g:hover{background:#05966935;transform:translateY(-1px)}
.btn:active{transform:scale(.97)!important}
.terminal{background:#0a0a0f;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:8px;font-family:var(--mono);font-size:11px;max-height:80px;overflow-y:auto}
.terminal::-webkit-scrollbar{width:3px}
.terminal::-webkit-scrollbar-track{background:transparent}
.terminal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.log-row{display:flex;gap:10px;line-height:1.6}
.ts{color:var(--text3);flex-shrink:0}
.lmsg{color:#86efac}
.lmsg.c{color:#a5b4fc}
.lmsg.e{color:#f87171}
</style>
<div class="wrap">
  <div class="hdr">
    <div class="logo-box">
      <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" fill="#fff" opacity=".9"/><rect x="11" y="2" width="7" height="7" rx="2" fill="#fff" opacity=".4"/><rect x="2" y="11" width="7" height="7" rx="2" fill="#fff" opacity=".4"/><rect x="11" y="11" width="7" height="7" rx="2" fill="#fff" opacity=".7"/></svg>
    </div>
    <div class="hdr-text">
      <h1>WrapWare</h1>
      <p>C2 Control Panel</p>
    </div>
    <div class="pill">
      <div class="dot off" id="dot"></div>
      <span id="status">offline</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-lbl">Hosts ativos</div><div class="stat-val">0<small>nodes</small></div></div>
    <div class="stat"><div class="stat-lbl">Comandos</div><div class="stat-val" id="cnt">0<small>sent</small></div></div>
    <div class="stat"><div class="stat-lbl">Sessão</div><div class="stat-val" id="uptime">00:00<small>min</small></div></div>
  </div>

  <div class="card">
    <div class="card-hdr">
      <div class="icon purple">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3.5h10M2 7h6.5M2 10.5h4" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="card-lbl">/msg</div>
        <div class="card-desc">Exibe um MessageBox no host remoto</div>
      </div>
    </div>
    <div class="input-row">
      <input class="inp" id="msgInput" placeholder="mensagem para o host...">
      <button class="btn v" onclick="dispatch('/msg','msgInput')">Enviar</button>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr">
      <div class="icon emerald">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="8.5" rx="1.5" stroke="#34d399" stroke-width="1.5"/><path d="M3.5 10.5l.8-2M10.5 10.5l-.8-2" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/><path d="M1.5 10.5h11" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="card-lbl">/wallpaper</div>
        <div class="card-desc">Troca o wallpaper via URL remota</div>
      </div>
    </div>
    <div class="input-row">
      <input class="inp" id="wallInput" placeholder="https://exemplo.com/imagem.jpg">
      <button class="btn g" onclick="dispatch('/wallpaper','wallInput')">Aplicar</button>
    </div>
  </div>

  <div class="terminal" id="log">
    <div class="log-row"><span class="ts">--:--:--</span><span class="lmsg">inicializando painel...</span></div>
  </div>
</div>

<script>
let n=0;
const log=document.getElementById('log');
const statusEl=document.getElementById('status');
const dotEl=document.getElementById('dot');
const cntEl=document.getElementById('cnt');
const start=Date.now();

function ts(){const d=new Date();return[d.getHours(),d.getMinutes(),d.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':')}
function addLog(msg,cls=''){const r=document.createElement('div');r.className='log-row';r.innerHTML=`<span class="ts">${ts()}</span><span class="lmsg ${cls}">${msg}</span>`;log.appendChild(r);log.scrollTop=log.scrollHeight}

function dispatch(cmd,id){
  const v=document.getElementById(id).value.trim();
  if(!v)return;
  n++;
  cntEl.innerHTML=n+'<small>sent</small>';
  addLog(cmd+' '+v,'c');
  document.getElementById(id).value='';
}

setInterval(()=>{
  const m=Math.floor((Date.now()-start)/60000);
  const s=Math.floor(((Date.now()-start)%60000)/1000);
  document.getElementById('uptime').innerHTML=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}<small>min</small>`;
},1000);

setTimeout(()=>{
  addLog('aguardando servidor socket.io...','e');
},800);
</script>
